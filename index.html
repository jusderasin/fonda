function beep(freq=880,dur=150,vol=0.25){try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=freq;o.type='sine';g.gain.setValueAtTime(vol,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur/1000);o.start();o.stop(ctx.currentTime+dur/1000);}catch(e){}}

function useCountdown(hhmm){
  const [cd,setCd]=useState('--:--:--');
  useEffect(()=>{
    const tick=()=>{const now=new Date();const[h,m]=hhmm.split(':').map(Number);const t=new Date(now);t.setHours(h,m,0,0);if(t<=now)t.setDate(t.getDate()+1);const d=Math.max(0,t-now);setCd(`${String(Math.floor(d/3600000)).padStart(2,'0')}:${String(Math.floor((d%3600000)/60000)).padStart(2,'0')}:${String(Math.floor((d%60000)/1000)).padStart(2,'0')}`);};
    tick();const id=setInterval(tick,1000);return()=>clearInterval(id);
  },[hhmm]);
  return cd;
}

function NewsFeed({news}){
  const [impF,setImpF]=useState('ALL');
  const [assF,setAssF]=useState([]);
  const [exp,setExp]=useState(null);
  const filtered=news.filter(n=>{
    if(impF!=='ALL'&&n.impact!==impF)return false;
    if(assF.length&&!assF.some(a=>n.tags.includes(a)))return false;
    return true;
  });
  const toggle=a=>setAssF(p=>p.includes(a)?p.filter(x=>x!==a):[...p,a]);
  return(
    <div className="flex flex-col h-full">
      <div className="shrink-0 px-3 py-2 space-y-2" style={{borderBottom:'1px solid rgba(255,255,255,.05)'}}>
        <div className="flex items-center gap-1.5 flex-wrap">
          {['ALL','HIGH','MEDIUM','LOW'].map(f=>(
            <button key={f} onClick={()=>setImpF(f)}
              className={`mono text-[10px] px-2.5 py-1 rounded border transition-all ${impF===f?(f==='HIGH'?'text-red-400 border-red-800 bg-red-950/50':f==='MEDIUM'?'text-amber-400 border-amber-800 bg-amber-950/50':f==='LOW'?'text-slate-400 border-slate-700':'text-cyan-400 border-cyan-800 bg-cyan-950/50'):'text-slate-500 border-slate-800'}`}>
              {f==='HIGH'?'🔴 ':f==='MEDIUM'?'🟡 ':f==='LOW'?'⚪ ':''}{f}
            </button>
          ))}
          <span className="ml-auto mono text-[10px] text-slate-600">{filtered.length} items</span>
        </div>
        <div className="flex gap-1 flex-wrap">
          {['USD','EUR','GBP','JPY','GOLD','OIL','BTC','NQ','SPX'].map(a=>(
            <button key={a} onClick={()=>toggle(a)}
              className={`mono text-[10px] px-2 py-0.5 rounded border transition-all ${assF.includes(a)?'text-cyan-400 border-cyan-800 bg-cyan-950/40':'text-slate-600 border-slate-800'}`}>{a}</button>

}

function Gauge({score=62}){
  const angle=(score/100)*180-90;

  return(
    <div className="flex flex-col items-center py-2">
      <svg viewBox="0 0 200 115" className="w-40">
        <defs><linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%">

        </linearGradient></defs>
        <path d="M25 100 A75 75 0 0 1 175 100" fill="none" stroke="#1a2035" strokeWidth="14" strokeLinecap="round"/>
        <path d="M25 100 A75 75 0 0 1 175 100" fill="none" stroke="url(#g1)" strokeWidth="8" strokeLinecap="round" opacity=".7"/>
        <g transform={`translate(100,100) rotate(${angle})`}>
          <line x1="0" y1="0" x2="0" y2="-65" stroke={color} strokeWidth="2.5" strokeLinecap="round"/>
          <circle r="5" fill={color}/>
        </g>
        <text x="100" y="85" fill={color} fontSize="22" fontFamily="monospace" textAnchor="middle" fontWeight="800">{score}</text>
        <text x="28" y="112" fill="#ff3b3b" fontSize="8" fontFamily="monospace">RISK-OFF</text>
        <text x="138" y="112" fill="#00ff88" fontSize="8" fontFamily="monospace">RISK-ON</text>
      </svg>
    </div>
  );
}

function AuthModal({onClose,onAuth}){
  const [mode,setMode]=useState('login');
  const [email,setEmail]=useState('');
  const [pw,setPw]=useState('');
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState('');
  const [ok,setOk]=useState('');

  const submit=async(e)=>{
    e.preventDefault();setErr('');setOk('');setLoading(true);
    try{
      if(mode==='register'){
        const{error}=await sb.auth.signUp({email,password:pw});
        if(error)throw error;
        setOk('Compte créé ! Vérifie ton email.');
      }else if(mode==='login'){
        const{data,error}=await sb.auth.signInWithPassword({email,password:pw});
        if(error)throw error;
        onAuth(data.user);onClose();
      }else{
        const{error}=await sb.auth.resetPasswordForEmail(email);
        if(error)throw error;
        setOk('Email de reset envoyé !');
      }
    }catch(e){setErr(e.message);}finally{setLoading(false);}
  };

  return(
    <div className="fixed inset-0 z-[100] flex items-center justify-center" style={{background:'rgba(7,9,16,.92)',backdropFilter:'blur(8px)'}}>
      <div className="w-full max-w-sm mx-4 fade-up" style={{background:'#0d1220',border:'1px solid rgba(0,212,255,.2)',borderRadius:12,overflow:'hidden'}}>
        <div className="px-6 pt-6 pb-4" style={{borderBottom:'1px solid rgba(255,255,255,.06)'}}>
          <div className="flex items-center justify-between mb-1">
            <div className="flex items-center gap-2">
              <span className="text-cyan-400 font-bold mono text-sm tracking-widest">MACRO</span>
              <span className="text-slate-100 font-bold mono text-sm tracking-widest">TERMINAL</span>
            </div>
            <button onClick={onClose} className="text-slate-500 hover:text-slate-300 text-lg">✕</button>
          </div>
          <p className="text-slate-500 mono text-xs">{mode==='login'?'Connexion':mode==='register'?'Créer un compte':'Reset mot de passe'}</p>
        </div>
        <form onSubmit={submit} className="p-6 space-y-4">
          <div>
            <label className="block mono text-xs text-slate-400 mb-1.5">EMAIL</label>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} required placeholder="trader@example.com"
              className="w-full mono text-sm px-3 py-2.5 rounded outline-none"
              style={{background:'#080c18',border:'1px solid rgba(255,255,255,.08)',color:'#e2e8f0'}}
              onFocus={e=>e.target.style.borderColor='rgba(0,212,255,.5)'}
              onBlur={e=>e.target.style.borderColor='rgba(255,255,255,.08)'}/>
          </div>
          {mode!=='reset'&&(
            <div>
              <label className="block mono text-xs text-slate-400 mb-1.5">PASSWORD</label>
              <input type="password" value={pw} onChange={e=>setPw(e.target.value)} required placeholder="••••••••"
                className="w-full mono text-sm px-3 py-2.5 rounded outline-none"
                style={{background:'#080c18',border:'1px solid rgba(255,255,255,.08)',color:'#e2e8f0'}}
                onFocus={e=>e.target.style.borderColor='rgba(0,212,255,.5)'}
                onBlur={e=>e.target.style.borderColor='rgba(255,255,255,.08)'}/>
            </div>
          )}
          {err&&<div className="mono text-xs text-red-400 px-3 py-2 rounded" style={{background:'rgba(255,59,59,.1)',border:'1px solid rgba(255,59,59,.2)'}}>{err}</div>}
          {ok&&<div className="mono text-xs text-green-400 px-3 py-2 rounded" style={{background:'rgba(0,255,136,.08)',border:'1px solid rgba(0,255,136,.2)'}}>{ok}</div>}
          <button type="submit" disabled={loading} className="w-full py-2.5 rounded mono text-sm font-bold"
            style={{background:loading?'#0e1a2e':'linear-gradient(135deg,#00b4d8,#0077b6)',color:loading?'#4a6080':'#fff'}}>
            {loading?'Chargement…':mode==='login'?'SE CONNECTER':mode==='register'?'CRÉER LE COMPTE':'ENVOYER LE RESET'}
          </button>
          <div className="flex items-center justify-between pt-1">
            {mode==='login'?(
              <>
                <button type="button" onClick={()=>{setMode('register');setErr('');setOk('');}} className="mono text-xs text-slate-500 hover:text-cyan-400">Pas encore de compte →</button>
                <button type="button" onClick={()=>{setMode('reset');setErr('');setOk('');}} className="mono text-xs text-slate-500 hover:text-slate-300">Mot de passe oublié</button>
              </>
            ):(
              <button type="button" onClick={()=>{setMode('login');setErr('');setOk('');}} className="mono text-xs text-slate-500 hover:text-cyan-400">← Retour</button>
            )}
          </div>
        </form>
        <div className="px-6 pb-6">
          <button onClick={onClose} className="w-full py-2 rounded mono text-xs text-slate-500 hover:text-slate-300"
            style={{border:'1px solid rgba(255,255,255,.05)'}}>Continuer en mode invité</button>
        </div>
      </div>
    </div>
  );
}

// ── SETTINGS ──
function Settings({user,onAuth}){
  const [al,setAl]=useState(true);const [ar,setAr]=useState(true);const [sq,setSq]=useState(false);
  const Toggle=({v,s})=>(
    <button onClick={()=>s(x=>!x)} className="w-9 h-5 rounded-full relative transition-colors" style={{background:v?'#0077b6':'#1a2035'}}>
      <span className="absolute top-0.5 w-4 h-4 bg-white rounded-full transition-transform" style={{transform:v?'translateX(18px)':'translateX(2px)'}}/>
    </button>
  );
  return(
    <div className="h-full overflow-y-auto p-6">
      <h2 className="mono text-sm font-bold text-slate-100 mb-6">⚙️ Paramètres</h2>
      <div className="mb-6 p-4 rounded max-w-sm" style={{background:'#0d1220',border:'1px solid rgba(255,255,255,.06)'}}>
        <p className="mono text-[10px] text-cyan-400 uppercase tracking-widest mb-3">Compte Supabase</p>
        {user?(
          <div className="flex items-center justify-between">
            <div><p className="mono text-xs text-slate-200">{user.email}</p><p className="mono text-[10px] text-slate-500">Plan: Free</p></div>
            <div className="w-8 h-8 rounded-full bg-cyan-950 border border-cyan-800 flex items-center justify-center mono text-xs text-cyan-400">{user.email?.[0].toUpperCase()}</div>
          </div>
        ):(
          <div className="flex items-center justify-between">
            <p className="mono text-xs text-slate-400">Mode invité</p>
            <button onClick={onAuth} className="mono text-xs px-3 py-1.5 rounded font-bold" style={{background:'linear-gradient(135deg,#0077b6,#00b4d8)',color:'#fff'}}>SIGN IN</button>
          </div>
        )}
      </div>
      <div className="space-y-2 max-w-sm">
        {[['Sound Alerts','Bip sur les news HIGH impact',al,setAl],['Auto-Refresh','Nouvelle news toutes les 30s',ar,setAr],['Auto Squawk',"Lecture vocale à l'arrivée",sq,setSq]].map(([l,sub,v,s])=>(
          <div key={l} className="flex items-center justify-between p-3 rounded" style={{background:'#0d1220',border:'1px solid rgba(255,255,255,.05)'}}>
            <div><p className="mono text-xs text-slate-200">{l}</p><p className="mono text-[10px] text-slate-600">{sub}</p></div>
            <Toggle v={v} s={s}/>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── CALENDAR WIDGET ──
function CDWid({time}){const cd=useCountdown(time);return <span className="mono text-[10px] text-cyan-400">{cd}</span>;}
function CalWidget(){
  return(
    <div className="h-full overflow-y-auto p-2.5">
      <p className="mono text-[9px] text-slate-600 uppercase tracking-widest mb-2">📅 Next Releases</p>
      <div className="space-y-1.5">
        {CAL.filter(e=>e.status!=='past').map(ev=>(
          <div key={ev.id} className="p-2 rounded" style={{background:ev.status==='next'?'rgba(239,68,68,.07)':'#0d1220',border:`1px solid ${ev.status==='next'?'rgba(239,68,68,.25)':'rgba(255,255,255,.05)'}`}}>
            <div className="flex items-center justify-between mb-0.5">
              <span className="mono text-[10px] text-slate-500">{ev.time}</span>
              <span>{ev.flag}</span>
              <Badge impact={ev.impact}/>
            </div>
            <p className="mono text-[10px] text-slate-300 leading-tight mb-1">{ev.event}</p>
            <CDWid time={ev.time}/>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── APP ──
let xi=0;
function genNews(){
  const s=EXTRA[xi++%EXTRA.length];
  return{...s,id:Date.now(),time:new Date().toLocaleTimeString('en-GB',{hour12:false}),isNew:true,tags:s.tags||[]};
}

function App(){
  const [tab,setTab]=useState('news');
  const [news,setNews]=useState(NEWS);
  const [squawk,setSquawk]=useState(false);
  const [user,setUser]=useState(null);
  const [showAuth,setShowAuth]=useState(false);
  const sqRef=useRef(false);

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{if(session?.user)setUser(session.user);});
    const{data:l}=sb.auth.onAuthStateChange((_,s)=>setUser(s?.user??null));
    return()=>l.subscription.unsubscribe();
  },[]);

  useEffect(()=>{sqRef.current=squawk;},[squawk]);

  useEffect(()=>{
    const id=setInterval(()=>{
      const item=genNews();
      setNews(p=>[item,...p.map(n=>({...n,isNew:false}))].slice(0,60));
      if(item.impact==='HIGH'){beep(660,200,.3);setTimeout(()=>beep(880,150,.25),230);}
      else beep(440,100,.15);
      if(sqRef.current&&window.speechSynthesis){
        const u=new SpeechSynthesisUtterance(`${item.impact} impact — ${item.title}`);
        u.rate=1.1;window.speechSynthesis.speak(u);
      }
    },30000);
    return()=>clearInterval(id);
  },[]);

  const logout=async()=>{await sb.auth.signOut();setUser(null);};

  const renderTab=()=>{
    switch(tab){
      case 'news':return <NewsFeed news={news}/>;
      case 'calendar':return <CalendarTab/>;
      case 'macro':return <MacroHub/>;
      case 'banks':return <CentralBanks/>;
      case 'earnings':return <Earnings/>;
      case 'charts':return <Charts/>;
      case 'tv':return <FinancialTV/>;
      case 'settings':return <Settings user={user} onAuth={()=>setShowAuth(true)}/>;
      default:return null;
    }
  };

  return(
    <div className="fixed inset-0" style={{background:'#070910',fontFamily:'Syne,sans-serif'}}>
      <Topbar user={user} onAuth={()=>setShowAuth(true)} onLogout={logout} squawk={squawk} setSquawk={setSquawk}/>
      <Sidebar active={tab} set={setTab}/>
      <main className="fixed top-11 left-14 bottom-0 overflow-hidden" style={{right:tab==='calendar'?0:260}}>
        {renderTab()}
      </main>
      {tab!=='calendar'&&(
        <aside className="fixed top-11 right-0 bottom-0 w-[260px]"
          style={{borderLeft:'1px solid rgba(255,255,255,.05)',background:'rgba(7,9,16,.97)'}}>
          <CalWidget/>
        </aside>
      )}
      {showAuth&&<AuthModal onClose={()=>setShowAuth(false)} onAuth={setUser}/>}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
